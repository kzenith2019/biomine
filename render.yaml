services:
  - type: web
    name: biomine-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m scripts.seed_mibig && python -m scripts.train && python -m scripts.precompute 200 || echo "ML pipeline failed, starting with empty DB"
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"

  - type: web
    name: biomine-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://biomine-jfwx.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
